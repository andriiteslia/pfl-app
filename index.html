<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0057B8" />
  <title>ФРСУ · AREA</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Google+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <img src="assets/imgs/fsfu_logo_rec.png" alt="ФРСУ" class="header-logo-rec" onerror="this.style.display='none'" />
      <div class="header-title"></div>
      <div class="header-right">
        <span class="last-updated" id="lastUpdated"></span>
        <button class="header-refresh-btn" id="refreshBtn" aria-label="Оновити дані">
          <span class="refresh-btn-text">Оновити</span>
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main id="main" class="main">

    <!-- ОФІЦІЙНІ TAB -->
    <section id="tab-results" class="tab active" aria-label="Офіційні">

      <!-- Page title -->
      <div class="results-page-title">
        <h2>Офіційні результати ФРСУ</h2>
        <p>AREA · Ловля форелі в озерах</p>
      </div>

      <!-- Filter chips -->
      <div class="chips-wrap" id="result-chips" role="group" aria-label="Фільтр"></div>

      <!-- Results list renders here -->
      <div id="results-list" class="results-list"></div>

    </section>

    <!-- ІНШІ TAB -->
    <section id="tab-other" class="tab" aria-label="Інші">

      <div class="results-page-title">
        <h2>Інші змагання</h2>
        <p>Регіональні та відкриті старти</p>
      </div>

      <!-- Filter chips -->
      <div class="chips-wrap" id="other-chips" role="group" aria-label="Фільтр"></div>

      <!-- Results list renders here -->
      <div id="other-list" class="results-list"></div>

    </section>

    <!-- ПРО ФРСУ TAB -->
    <section id="tab-about" class="tab" aria-label="Про ФРСУ">
      <div id="about-content" class="about-content"></div>
    </section>

    <!-- FOOTER -->
    <footer class="app-footer">
      Made by <a href="https://t.me/andriiteslia" target="_blank" rel="noopener">Andrii Teslia</a>
      · <span id="appVersion">v1.0.2</span>
      · 2026
    </footer>

  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" role="tablist">
    <div class="nav-inner">
      <button class="nav-btn active" data-tab="results" role="tab" aria-selected="true" aria-controls="tab-results">
        <span class="nav-icon" aria-hidden="true">🏆</span>
        <span class="nav-label">Офіційні</span>
      </button>
      <button class="nav-btn" data-tab="other" role="tab" aria-selected="false" aria-controls="tab-other">
        <span class="nav-icon" aria-hidden="true">🎣</span>
        <span class="nav-label">Інші</span>
      </button>
      <button class="nav-btn" data-tab="about" role="tab" aria-selected="false" aria-controls="tab-about">
        <span class="nav-icon" aria-hidden="true">🏛️</span>
        <span class="nav-label">Про ФРСУ</span>
      </button>
    </div>
  </nav>

</div>

<!-- Scripts (order matters) -->
<script src="js/data.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
